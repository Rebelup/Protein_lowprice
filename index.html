<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>핏허브</title>
  <link rel="stylesheet" href="style.css?v=20260511" />
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>불러오는 중...</p>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-search">
        <input type="text" id="searchInput" placeholder="검색" autocomplete="off" />
        <button id="searchBtn" class="search-icon-btn" aria-label="검색">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        </button>
        <div class="search-suggest hidden" id="searchSuggest"></div>
      </div>
      <button class="auth-btn" id="authBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="authBtnLabel">로그인</span>
      </button>
      <div class="header-icon-group hidden" id="headerIconGroup">
        <button class="header-icon-btn" id="userBtn" aria-label="내 정보">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 탭 바 -->
  <nav class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="products">상품</button>
    <button class="tab-btn" data-tab="events">이벤트</button>
  </nav>

  <!-- ===== 이벤트 탭 ===== -->
  <div id="eventsTab" class="hidden">
    <div class="filter-row">
      <div class="filter-left">
        <button class="sort-btn" id="sortBtn">
          <span id="sortLabel">할인 높은순</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-divider"></div>
        <button class="filter-btn" id="filterBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          <span>필터</span>
          <span class="filter-count hidden" id="filterCount">0</span>
        </button>
      </div>
    </div>
    <main>
      <section class="events-section">
        <div class="result-bar"><strong id="resultCount">0</strong>개 이벤트</div>
        <div class="events-grid" id="eventsGrid"></div>
        <div class="empty-state hidden" id="emptyState">
          <div class="empty-icon">🔍</div>
          <p>조건에 맞는 이벤트가 없습니다.</p>
          <button class="reset-btn" id="resetFilters">필터 초기화</button>
        </div>
      </section>
    </main>
  </div>

  <!-- ===== 상품 탭 ===== -->
  <div id="productsTab">
    <div class="filter-row filter-row--spread">
      <div class="filter-left">
        <button class="sort-btn" id="prodSortBtn">
          <span id="prodSortLabel">할인 높은순</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-divider"></div>
        <button class="filter-btn" id="prodFilterBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          <span>필터</span>
          <span class="filter-count hidden" id="prodFilterCount">0</span>
        </button>
      </div>
      <button class="ev-price-toggle" id="evPriceToggle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        이벤트 적용가
      </button>
    </div>
    <div class="prod-cat-row" id="prodCatRow"></div>
    <div class="prod-cat-row hidden" id="prodCat2Row" style="border-top: 1px solid var(--border); background: var(--bg);"></div>
    <main>
      <section class="events-section">
        <div class="result-bar"><strong id="prodResultCount">0</strong>개 상품</div>
        <div class="prod-grid" id="productsGrid"></div>
        <div class="empty-state hidden" id="prodEmptyState">
          <div class="empty-icon">📦</div>
          <p>등록된 상품이 없습니다.</p>
        </div>
      </section>
    </main>
  </div>

  <footer class="site-footer">
    <p>정보는 참고용이며 실제와 다를 수 있습니다.</p>
    <p>© 2026 핏허브</p>
  </footer>

  <!-- 공유 오버레이 -->
  <div class="sheet-overlay hidden" id="sheetOverlay"></div>

  <!-- 이벤트 정렬 시트 -->
  <div class="sort-sheet hidden" id="sortSheet">
    <div class="sheet-handle"></div>
    <div class="sort-sheet-title">정렬</div>
    <button class="sort-option active" data-sort="discount_desc">할인 높은순</button>
    <button class="sort-option" data-sort="end_asc">종료 임박순</button>
    <button class="sort-option" data-sort="name">이름순</button>
  </div>

  <!-- 상품 정렬 시트 -->
  <div class="sort-sheet hidden" id="prodSortSheet">
    <div class="sheet-handle"></div>
    <div class="sort-sheet-title">정렬</div>
    <button class="sort-option active" data-sort="discount_desc">할인 높은순</button>
    <button class="sort-option" data-sort="price_asc">가격 낮은순</button>
    <button class="sort-option" data-sort="price_desc">가격 높은순</button>
    <button class="sort-option" data-sort="name">이름순</button>
  </div>

  <!-- 상품 필터 시트 -->
  <div class="filter-sheet hidden" id="prodFilterSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">상품 필터</span>
      <button class="sheet-close" id="prodFilterSheetClose">✕</button>
    </div>
    <div class="filter-sheet-body">
      <div class="filter-section">
        <div class="filter-group-title">브랜드</div>
        <div class="filter-group" id="prodBrandFilterGroup"></div>
      </div>
      <div class="filter-section">
        <div class="filter-group-title">가격대</div>
        <div class="filter-group" id="prodPriceGroup">
          <label class="filter-sheet-item checked"><input type="radio" name="prodPrice" class="prod-price-rb" value="all" checked /><span>전체</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodPrice" class="prod-price-rb" value="u30000" /><span>3만원 이하</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodPrice" class="prod-price-rb" value="u50000" /><span>5만원 이하</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodPrice" class="prod-price-rb" value="u100000" /><span>10만원 이하</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodPrice" class="prod-price-rb" value="o100000" /><span>10만원 이상</span></label>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-group-title">할인율</div>
        <div class="filter-group" id="prodDiscountGroup">
          <label class="filter-sheet-item checked"><input type="radio" name="prodDiscount" class="prod-disc-rb" value="0" checked /><span>전체</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodDiscount" class="prod-disc-rb" value="10" /><span>10% 이상</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodDiscount" class="prod-disc-rb" value="30" /><span>30% 이상</span></label>
          <label class="filter-sheet-item"><input type="radio" name="prodDiscount" class="prod-disc-rb" value="50" /><span>50% 이상</span></label>
        </div>
      </div>
    </div>
    <div class="filter-sheet-footer">
      <button class="filter-reset-btn" id="prodFilterReset">초기화</button>
      <button class="filter-apply-btn" id="prodFilterApply">적용하기</button>
    </div>
  </div>

  <!-- 필터 시트 -->
  <div class="filter-sheet hidden" id="filterSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">필터</span>
      <button class="sheet-close" id="filterSheetClose">✕</button>
    </div>
    <div class="filter-sheet-body">
      <div class="filter-section">
        <div class="filter-group-title">브랜드</div>
        <div class="filter-group" id="brandFilterGroup"></div>
      </div>
      <div class="filter-section">
        <div class="filter-group-title">상품 유형</div>
        <div class="filter-group" id="typeFilterGroup"></div>
      </div>
      <div class="filter-section">
        <div class="filter-group-title">기간</div>
        <div class="filter-group" id="periodFilterGroup">
          <label class="filter-sheet-item checked"><input type="radio" name="period" class="period-rb" value="all" checked /><span>전체</span></label>
          <label class="filter-sheet-item"><input type="radio" name="period" class="period-rb" value="ongoing" /><span>진행중</span></label>
          <label class="filter-sheet-item"><input type="radio" name="period" class="period-rb" value="ending" /><span>종료임박 (7일)</span></label>
          <label class="filter-sheet-item"><input type="radio" name="period" class="period-rb" value="upcoming" /><span>예정</span></label>
          <label class="filter-sheet-item"><input type="radio" name="period" class="period-rb" value="ended" /><span>종료</span></label>
        </div>
      </div>
    </div>
    <div class="filter-sheet-footer">
      <button class="filter-reset-btn" id="filterReset">초기화</button>
      <button class="filter-apply-btn" id="filterApply">적용하기</button>
    </div>
  </div>

  <!-- 로그인 시트 -->
  <div class="login-overlay hidden" id="loginOverlay"></div>
  <div class="login-sheet hidden" id="loginSheet">
    <div class="login-header">
      <button class="login-close" id="loginClose">✕</button>
    </div>
    <div id="loginForm">
      <div class="login-logo">💪</div>
      <h2 class="login-title">로그인</h2>
      <p class="login-sub">로그인 후 이벤트를 관리하세요</p>
      <button class="social-btn social-google" id="loginGoogle">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 계속하기
      </button>
      <div class="login-divider"><span>또는</span></div>
      <div class="login-field-group">
        <input type="email" id="loginEmail" class="login-input" placeholder="이메일" autocomplete="email" />
        <input type="password" id="loginPassword" class="login-input" placeholder="비밀번호" autocomplete="current-password" />
      </div>
      <div id="loginError" class="login-error hidden"></div>
      <button class="login-submit-btn" id="loginSubmit">로그인</button>
      <p class="login-switch">계정이 없으신가요? <button class="link-btn" id="goSignup">회원가입</button></p>
    </div>
    <div id="signupForm" class="hidden">
      <div class="login-logo">💪</div>
      <h2 class="login-title">회원가입</h2>
      <div class="login-field-group">
        <input type="email" id="signupEmail" class="login-input" placeholder="이메일" autocomplete="email" />
        <input type="password" id="signupPassword" class="login-input" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" />
        <input type="password" id="signupPasswordConfirm" class="login-input" placeholder="비밀번호 확인" autocomplete="new-password" />
      </div>
      <div id="signupError" class="login-error hidden"></div>
      <button class="login-submit-btn" id="signupSubmit">가입하기</button>
      <p class="login-switch">이미 계정이 있으신가요? <button class="link-btn" id="goLogin">로그인</button></p>
    </div>
  </div>

  <!-- 상품 상세 페이지 -->
  <div class="event-page hidden" id="prodPage">
    <div class="ep-header">
      <button class="ep-back" id="prodPageBack" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="ep-title">상품 상세</span>
      <button class="ep-share icon-btn" id="prodPageShare" aria-label="공유">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
    <div class="ep-body" id="prodPageBody"></div>
    <div class="pp-cta-bar" id="ppCtaBar"></div>
  </div>

  <!-- 이벤트 상세 페이지 -->
  <div class="event-page hidden" id="eventPage">
    <div class="ep-header">
      <button class="ep-back" id="eventPageBack" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="ep-title">이벤트 상세</span>
    </div>
    <div class="ep-body" id="eventPageBody"></div>
    <div class="pp-cta-bar" id="epCtaBar"></div>
  </div>

  <!-- 유저 시트 -->
  <div class="user-sheet hidden" id="userSheet">
    <div class="sheet-handle"></div>
    <div class="user-sheet-header">
      <button class="login-close" id="userSheetClose">✕</button>
    </div>
    <div class="user-sheet-body">
      <div class="user-avatar" id="userAvatar"></div>
      <div class="user-name" id="userSheetName"></div>
      <div class="user-email" id="userSheetEmail"></div>
      <a href="admin.html" class="user-admin-btn hidden" id="userAdminBtn">이벤트 관리</a>
      <button class="user-logout-btn" id="userLogoutBtn">로그아웃</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <div class="toast" id="toast"></div>
  <script src="script.js?v=20260511"></script>
</body>
</html>
