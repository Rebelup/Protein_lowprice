<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Rebel-Up</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ── 로딩 화면 ── -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-spinner"></div>
  <h2>Rebel-Up</h2>
  <p>잠시만 기다려주세요...</p>
</div>

<!-- ── 인증 화면 ── -->
<div id="auth-screen" class="hidden">
  <div class="auth-logo-section">
    <div class="auth-logo">
      <h1>Rebel-Up</h1>
    </div>
  </div>
  <div class="auth-bottom">
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
    <p id="auth-error" class="error-msg"></p>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="app" class="hidden">

  <!-- ── 루틴 탭 ── -->
  <div id="page-routine" class="page active">
    <div class="page-inner">
      <header class="routine-header">
        <button class="month-btn" onclick="openMonthPicker()">
          <span id="header-month">2026년 4월</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="header-actions">
          <button class="streak-badge">
            🔥<span id="streak-count">0</span>
          </button>
        </div>
      </header>

      <div class="week-calendar" id="week-calendar">
        <div id="week-days" class="week-days"></div>
      </div>

      <div class="inner-tabs">
        <button class="inner-tab active" onclick="switchInnerTab('exercise', this)">운동</button>
        <button class="inner-tab" onclick="switchInnerTab('diet', this)">식단</button>
      </div>

      <div class="routine-content">
        <div class="routine-toolbar" id="routine-toolbar">
          <button class="period-btn" id="period-btn" onclick="togglePeriodMenu()">
            <span id="period-label">하루</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="period-menu" class="period-menu hidden">
            <button onclick="setPeriod('하루')">하루</button>
            <button onclick="setPeriod('오전')">오전</button>
            <button onclick="setPeriod('오후')">오후</button>
            <button onclick="setPeriod('저녁')">저녁</button>
          </div>
        </div>
        <div id="routine-list"></div>
      </div>
    </div>
    <button class="fab" onclick="openAddRoutineModal()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ── 커뮤니티 탭 ── -->
  <div id="page-community" class="page">
    <div class="page-inner">
      <header class="simple-header">
        <h2>커뮤니티</h2>
      </header>
      <div class="category-filter-bar" id="category-filter-bar">
        <button class="cat-pill active" data-cat-id="" onclick="filterByCategory(this)">전체</button>
      </div>
      <div id="posts-list" class="posts-list"></div>
    </div>
    <button class="fab" onclick="openCompose()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ── 알림 탭 ── -->
  <div id="page-notify" class="page">
    <div class="page-inner">
      <header class="simple-header">
        <h2>알림</h2>
        <button class="mark-all-btn" onclick="markAllRead()">모두 읽음</button>
      </header>
      <div id="notify-list" class="notify-list"></div>
    </div>
  </div>

  <!-- ── 내정보 탭 ── -->
  <div id="page-my" class="page">
    <div class="page-inner">
      <header class="simple-header">
        <h2>내정보</h2>
        <button class="icon-btn" onclick="openEditProfileModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </header>
      <div id="profile-content"></div>
    </div>
  </div>

  <!-- ── 글쓰기 페이지 ── -->
  <div id="page-compose" class="page compose-page hidden-page">
    <div class="compose-header">
      <button class="compose-close-btn" onclick="closeCompose()">✕</button>
      <span class="compose-title" id="compose-title">새 게시물</span>
      <button class="compose-post-btn" id="compose-post-btn" onclick="savePost()" disabled>게시</button>
    </div>
    <div class="compose-body">
      <div class="compose-author-row">
        <div class="avatar compose-avatar" id="compose-avatar">?</div>
        <div class="compose-input-area">
          <div class="compose-username" id="compose-username"></div>
          <textarea id="post-content" class="compose-textarea"
                    placeholder="오늘의 운동이나 식단을 공유해보세요!"
                    oninput="onComposeInput(this)"></textarea>
          <div class="compose-category-row">
            <div class="compose-category-label">카테고리 <span style="color:#ef4444">*</span></div>
            <div class="compose-cat-pills" id="compose-cat-pills"></div>
          </div>
          <div class="compose-attach-row">
            <button class="attach-btn" onclick="document.getElementById('photo-input').click()" title="사진">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            </button>
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
          </div>
        </div>
      </div>
      <div id="photo-preview" class="photo-preview hidden"></div>
    </div>
    <div class="compose-footer">
      <span class="compose-hint">카테고리를 선택한 후 게시해주세요</span>
    </div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="routine" onclick="switchPage('routine', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>루틴</span>
    </button>
    <button class="nav-btn" data-page="community" onclick="switchPage('community', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span>커뮤니티</span>
    </button>
    <button class="nav-btn" data-page="notify" onclick="switchPage('notify', this)">
      <div class="nav-btn-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notify-badge hidden" id="notify-badge"></span>
      </div>
      <span>알림</span>
    </button>
    <button class="nav-btn" data-page="my" onclick="switchPage('my', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>내정보</span>
    </button>
  </nav>
</div>

<!-- ── 게시물 상세 (전체화면) ── -->
<div id="modal-post-detail" class="post-detail-overlay hidden">
  <div class="post-detail-page">
    <div class="post-detail-topbar">
      <button class="pd-back-btn" onclick="closeModal('modal-post-detail')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="pd-topbar-title">게시물</span>
      <button class="pd-more-btn" onclick="sharePost(state.currentPostId)" title="공유">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="pd-more-btn" id="pd-more-btn" onclick="openCurrentPostMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
    <div class="post-detail-scroll" id="post-detail-body"></div>
    <div class="comment-input-bar">
      <div class="reply-hint hidden" id="reply-hint">
        <span id="reply-hint-name"></span>에게 답글 작성 중
        <button onclick="cancelReply()">✕</button>
      </div>
      <div class="comment-input-row">
        <textarea id="comment-text" placeholder="댓글을 입력하세요..." rows="1" oninput="autoResizeComment(this)"></textarea>
        <button class="comment-submit-btn" onclick="submitComment()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 게시물 액션 시트 ── -->
<div id="modal-post-action" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-post-action')">
  <div class="modal-sheet action-sheet">
    <div class="modal-handle"></div>
    <div id="post-action-list" class="post-action-list"></div>
  </div>
</div>

<!-- ── 루틴 추가/수정 모달 ── -->
<div id="modal-add-routine" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-add-routine')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="routine-modal-title">루틴 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-add-routine')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>종류</label>
        <div class="type-selector">
          <button class="type-btn active" data-type="exercise" onclick="selectType(this)">운동</button>
          <button class="type-btn" data-type="diet" onclick="selectType(this)">식단</button>
        </div>
      </div>
      <div class="form-group" id="meal-time-group" style="display:none">
        <label>식사 종류 <span style="color:#ef4444">*</span></label>
        <div class="meal-time-selector">
          <button class="meal-btn" data-meal="아침" onclick="toggleMeal(this)">아침</button>
          <button class="meal-btn" data-meal="점심" onclick="toggleMeal(this)">점심</button>
          <button class="meal-btn" data-meal="저녁" onclick="toggleMeal(this)">저녁</button>
          <button class="meal-btn" data-meal="간식" onclick="toggleMeal(this)">간식</button>
        </div>
      </div>
      <div class="form-group">
        <label>루틴 이름</label>
        <input type="text" id="routine-name" placeholder="예: 오전 운동, 아침 식단">
      </div>
      <div class="form-group">
        <label>시간대</label>
        <div class="tod-selector">
          <button class="tod-btn active" data-tod="" onclick="toggleTod(this)">하루</button>
          <button class="tod-btn" data-tod="오전" onclick="toggleTod(this)">오전</button>
          <button class="tod-btn" data-tod="오후" onclick="toggleTod(this)">오후</button>
          <button class="tod-btn" data-tod="저녁" onclick="toggleTod(this)">저녁</button>
        </div>
      </div>
      <div class="form-group">
        <label>요일 설정</label>
        <div class="days-selector">
          <button class="day-btn active" data-day="1" onclick="toggleDay(this)">월</button>
          <button class="day-btn active" data-day="2" onclick="toggleDay(this)">화</button>
          <button class="day-btn active" data-day="3" onclick="toggleDay(this)">수</button>
          <button class="day-btn active" data-day="4" onclick="toggleDay(this)">목</button>
          <button class="day-btn active" data-day="5" onclick="toggleDay(this)">금</button>
          <button class="day-btn" data-day="6" onclick="toggleDay(this)">토</button>
          <button class="day-btn" data-day="0" onclick="toggleDay(this)">일</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveRoutine()">저장하기</button>
    </div>
  </div>
</div>

<!-- ── 프로필 수정 모달 ── -->
<div id="modal-edit-profile" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-edit-profile')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>프로필 수정</h3>
      <button class="modal-close" onclick="closeModal('modal-edit-profile')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="edit-username" placeholder="닉네임을 입력해주세요">
      </div>
      <div class="form-group">
        <label>한 줄 소개</label>
        <input type="text" id="edit-bio" placeholder="나를 소개해주세요">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveProfile()">저장하기</button>
    </div>
  </div>
</div>

<!-- ── 프로필 초기 설정 오버레이 ── -->
<div id="profile-setup-overlay" class="setup-overlay hidden">
  <div class="setup-page">
    <div class="setup-header">
      <h2>프로필 설정</h2>
      <p>Rebel-Up에 오신 걸 환영해요!<br>프로필을 먼저 설정해주세요.</p>
    </div>
    <div class="setup-body">
      <div class="setup-photo-section">
        <div class="setup-avatar-wrap" onclick="document.getElementById('setup-photo-input').click()">
          <div class="setup-avatar" id="setup-avatar">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="setup-photo-label">사진 선택</span>
        </div>
        <input type="file" id="setup-photo-input" accept="image/*" style="display:none" onchange="handleSetupPhoto(event)">
      </div>
      <div class="setup-field">
        <label>닉네임 <span style="color:#ef4444">*</span></label>
        <input type="text" id="setup-username" placeholder="닉네임을 입력해주세요" maxlength="20">
      </div>
      <div class="setup-field">
        <label>사는 곳</label>
        <div class="setup-location-hint">도/시 먼저 선택 후 구/시를 선택해주세요</div>
        <div class="location-pills-wrap" id="setup-province-pills"></div>
        <div class="location-pills-wrap" id="setup-district-pills" style="display:none"></div>
        <div class="setup-location-selected hidden" id="setup-location-display"></div>
      </div>
    </div>
    <div class="setup-footer">
      <button class="btn-primary" onclick="saveProfileSetup()">시작하기</button>
      <button class="setup-skip-btn" onclick="skipProfileSetup()">나중에 설정하기</button>
    </div>
  </div>
</div>

<!-- ── 월/년 피커 모달 ── -->
<div id="modal-month-picker" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-month-picker')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>날짜 선택</h3>
      <button class="modal-close" onclick="closeModal('modal-month-picker')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="picker-year-row">
        <button class="picker-year-btn" onclick="changePickerYear(-1)">‹</button>
        <span id="picker-year-display">2026</span>
        <button class="picker-year-btn" onclick="changePickerYear(1)">›</button>
      </div>
      <div class="picker-months" id="picker-months"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="confirmMonthPicker()">확인</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
