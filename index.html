<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>루틴</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ── 인증 화면 ── -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-icon">😊</div>
      <h1>루틴</h1>
      <p>건강한 습관을 만들어요</p>
    </div>

    <div id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="이메일" autocomplete="email">
      <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn-primary" onclick="handleLogin()">로그인</button>
      <div class="auth-divider">또는</div>
      <button class="btn-secondary" onclick="showRegister()">회원가입</button>
      <p id="login-error" class="error-msg"></p>
    </div>

    <div id="register-form" class="auth-form hidden">
      <input type="text" id="reg-username" placeholder="닉네임" autocomplete="username">
      <input type="email" id="reg-email" placeholder="이메일" autocomplete="email">
      <input type="password" id="reg-password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password">
      <button class="btn-primary" onclick="handleRegister()">가입하기</button>
      <button class="btn-ghost" onclick="showLogin()">← 로그인으로</button>
      <p id="reg-error" class="error-msg"></p>
    </div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="app" class="hidden">

  <!-- ── 루틴 탭 ── -->
  <div id="page-routine" class="page active">
    <div class="page-inner">
      <header class="routine-header">
        <button class="month-btn">
          <span id="header-month">2026년 4월</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="header-actions">
          <button class="streak-badge">
            🔥<span id="streak-count">0</span>
          </button>
        </div>
      </header>

      <div class="week-calendar">
        <div id="week-days" class="week-days"></div>
      </div>

      <div class="inner-tabs">
        <button class="inner-tab active" onclick="switchInnerTab('routine', this)">운동</button>
        <button class="inner-tab" onclick="switchInnerTab('todo', this)">식단</button>
      </div>

      <div class="routine-content">
        <div class="routine-toolbar">
          <div class="toolbar-left">
            <button class="period-btn" id="period-btn" onclick="togglePeriodMenu()">
              <span id="period-label">하루</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div id="period-menu" class="period-menu hidden">
              <button onclick="setPeriod('하루')">하루</button>
              <button onclick="setPeriod('오전')">오전</button>
              <button onclick="setPeriod('오후')">오후</button>
              <button onclick="setPeriod('저녁')">저녁</button>
            </div>
          </div>
          <button class="icon-btn small">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
        </div>
        <div id="routine-list"></div>
      </div>
    </div>
    <button class="fab" onclick="openAddRoutineModal()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ── 커뮤니티 탭 ── -->
  <div id="page-community" class="page">
    <div class="page-inner">
      <header class="simple-header">
        <h2>커뮤니티</h2>
      </header>
      <div id="posts-list" class="posts-list"></div>
    </div>
    <button class="fab" onclick="openAddPostModal()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ── 내정보 탭 ── -->
  <div id="page-my" class="page">
    <div class="page-inner">
      <header class="simple-header">
        <h2>내정보</h2>
        <button class="icon-btn" onclick="openEditProfileModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </header>
      <div id="profile-content"></div>
    </div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="routine" onclick="switchPage('routine', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>루틴</span>
    </button>
    <button class="nav-btn" data-page="community" onclick="switchPage('community', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span>커뮤니티</span>
    </button>
    <button class="nav-btn" data-page="my" onclick="switchPage('my', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>내정보</span>
    </button>
  </nav>
</div>

<!-- ── 루틴 추가 모달 ── -->
<div id="modal-add-routine" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-add-routine')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>루틴 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-add-routine')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>루틴 이름</label>
        <input type="text" id="routine-name" placeholder="예: 오전 운동, 아침 식단">
      </div>
      <div class="form-group">
        <label>종류</label>
        <div class="type-selector">
          <button class="type-btn active" data-type="exercise" onclick="selectType(this)">💪 운동</button>
          <button class="type-btn" data-type="diet" onclick="selectType(this)">🥗 식단</button>
        </div>
      </div>
      <div class="form-group">
        <label>요일 설정</label>
        <div class="days-selector">
          <button class="day-btn active" data-day="1">월</button>
          <button class="day-btn active" data-day="2">화</button>
          <button class="day-btn active" data-day="3">수</button>
          <button class="day-btn active" data-day="4">목</button>
          <button class="day-btn active" data-day="5">금</button>
          <button class="day-btn" data-day="6">토</button>
          <button class="day-btn" data-day="0">일</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveRoutine()">저장하기</button>
    </div>
  </div>
</div>

<!-- ── 게시글 작성 모달 ── -->
<div id="modal-add-post" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-add-post')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>글쓰기</h3>
      <button class="modal-close" onclick="closeModal('modal-add-post')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="post-author-row">
        <div class="avatar-sm" id="post-author-avatar">?</div>
        <span id="post-author-name" style="font-weight:600;font-size:14px"></span>
      </div>
      <textarea id="post-content" placeholder="오늘의 운동이나 식단을 공유해보세요! 💪" rows="5"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="savePost()">게시하기</button>
    </div>
  </div>
</div>

<!-- ── 프로필 수정 모달 ── -->
<div id="modal-edit-profile" class="modal-overlay hidden" onclick="handleOverlayClick(event,'modal-edit-profile')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>프로필 수정</h3>
      <button class="modal-close" onclick="closeModal('modal-edit-profile')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="edit-username" placeholder="닉네임을 입력해주세요">
      </div>
      <div class="form-group">
        <label>한 줄 소개</label>
        <input type="text" id="edit-bio" placeholder="나를 소개해주세요">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveProfile()">저장하기</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
