<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>닭가슴살 특가 모음</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로딩 오버레이 -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>상품 정보를 불러오는 중...</p>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-emoji">🍗</span>
        <strong>닭가슴살 특가</strong>
      </div>
      <div class="header-search">
        <button id="searchBtn" class="search-icon-btn" aria-label="검색">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        </button>
        <input type="text" id="searchInput" placeholder="상품, 브랜드 검색" />
      </div>
    </div>
  </header>

  <!-- 카테고리 탭 -->
  <div class="category-tabs-wrap">
    <div class="category-tabs" id="categoryFilter">
      <button class="tab active" data-category="all">전체</button>
      <button class="tab" data-category="훈제">훈제</button>
      <button class="tab" data-category="냉동">냉동</button>
      <button class="tab" data-category="냉장">냉장</button>
      <button class="tab" data-category="통조림">통조림</button>
      <button class="tab" data-category="가공">가공</button>
    </div>
  </div>

  <!-- 필터 행 -->
  <div class="filter-row">
    <button class="sort-btn" id="sortBtn">
      <span id="sortLabel">급하락순</span>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="filter-checks">
      <label class="filter-check">
        <input type="checkbox" id="filterRocket" />
        <span>🚀로켓배송</span>
      </label>
      <label class="filter-check">
        <input type="checkbox" id="filterActive" />
        <span>품절제외</span>
      </label>
    </div>
  </div>

  <!-- 정렬 바텀시트 -->
  <div class="sort-overlay hidden" id="sortOverlay"></div>
  <div class="sort-sheet hidden" id="sortSheet">
    <div class="sort-sheet-title">정렬</div>
    <button class="sort-option active" data-sort="discount">급하락순</button>
    <button class="sort-option" data-sort="price_asc">가격 낮은순</button>
    <button class="sort-option" data-sort="price_desc">가격 높은순</button>
    <button class="sort-option" data-sort="name">상품명순</button>
  </div>

  <main>
    <!-- TOP 10 섹션 -->
    <section class="top10-section">
      <h2 class="section-title">지금 인기 있는 TOP 10</h2>
      <div class="top10-scroll" id="top10Grid">
        <!-- JS에서 주입 -->
      </div>
    </section>

    <!-- 상품 그리드 -->
    <section class="products-section">
      <div class="result-bar">
        <strong id="resultCount">0</strong>개 상품
      </div>
      <div class="product-grid" id="productGrid">
        <!-- JS에서 주입 -->
      </div>
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">🔍</div>
        <p>조건에 맞는 상품이 없습니다.</p>
        <button class="reset-btn" id="resetFilters">필터 초기화</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>가격·할인 정보는 참고용이며 실제와 다를 수 있습니다.</p>
    <p>© 2026 닭가슴살 특가</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
