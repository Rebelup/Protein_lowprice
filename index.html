<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>닭가슴살 특가 모음 🍗</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍗</span>
        <div class="logo-text">
          <strong>닭가슴살 특가</strong>
          <small>최저가 할인 정보 모음</small>
        </div>
      </div>
      <div class="header-search">
        <input type="text" id="searchInput" placeholder="상품명, 브랜드 검색..." />
        <button id="searchBtn" aria-label="검색">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        </button>
      </div>
      <div class="header-meta">
        <span id="lastUpdated">업데이트: 2026-04-12</span>
      </div>
    </div>
  </header>

  <!-- HERO BANNER -->
  <section class="hero">
    <div class="hero-inner">
      <h1>오늘의 닭가슴살 <span class="accent">최저가</span></h1>
      <p>마트·편의점·온라인몰 할인 정보를 한곳에서 확인하세요</p>
      <div class="hero-stats">
        <div class="stat"><span id="totalProducts">0</span><small>개 상품</small></div>
        <div class="stat-divider"></div>
        <div class="stat"><span id="avgDiscount">0</span><small>% 평균할인</small></div>
        <div class="stat-divider"></div>
        <div class="stat"><span id="maxDiscount">0</span><small>% 최대할인</small></div>
      </div>
    </div>
  </section>

  <!-- FILTERS + PRODUCTS -->
  <main class="main-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <div class="filter-section">
        <h3 class="filter-title">카테고리</h3>
        <div class="filter-chips" id="categoryFilter">
          <button class="chip active" data-category="all">전체</button>
          <button class="chip" data-category="훈제">훈제</button>
          <button class="chip" data-category="냉동">냉동</button>
          <button class="chip" data-category="냉장">냉장</button>
          <button class="chip" data-category="통조림">통조림</button>
          <button class="chip" data-category="가공">가공식품</button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title">판매처</h3>
        <div class="store-list" id="storeFilter">
          <label class="store-item"><input type="checkbox" value="쿠팡" checked /> 쿠팡</label>
          <label class="store-item"><input type="checkbox" value="마켓컬리" checked /> 마켓컬리</label>
          <label class="store-item"><input type="checkbox" value="이마트" checked /> 이마트</label>
          <label class="store-item"><input type="checkbox" value="홈플러스" checked /> 홈플러스</label>
          <label class="store-item"><input type="checkbox" value="GS25" checked /> GS25</label>
          <label class="store-item"><input type="checkbox" value="올리브영" checked /> 올리브영</label>
          <label class="store-item"><input type="checkbox" value="오늘의식탁" checked /> 오늘의식탁</label>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title">최소 할인율</h3>
        <div class="range-wrapper">
          <input type="range" id="discountRange" min="0" max="60" value="0" step="5" />
          <span id="discountRangeLabel">0% 이상</span>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title">가격대</h3>
        <div class="price-inputs">
          <input type="number" id="priceMin" placeholder="최소" min="0" step="1000" />
          <span>~</span>
          <input type="number" id="priceMax" placeholder="최대" min="0" step="1000" />
        </div>
      </div>

      <button class="btn-reset" id="resetFilters">필터 초기화</button>
    </aside>

    <!-- PRODUCT GRID -->
    <section class="products-section">
      <div class="products-header">
        <p class="result-count"><strong id="resultCount">0</strong>개 상품</p>
        <select id="sortSelect">
          <option value="discount">할인율 높은순</option>
          <option value="price_asc">가격 낮은순</option>
          <option value="price_desc">가격 높은순</option>
          <option value="name">상품명순</option>
        </select>
      </div>

      <div class="product-grid" id="productGrid">
        <!-- cards injected by JS -->
      </div>

      <div class="empty-state" id="emptyState" style="display:none;">
        <span>🔍</span>
        <p>조건에 맞는 상품이 없습니다.</p>
        <button class="btn-reset" onclick="document.getElementById('resetFilters').click()">필터 초기화</button>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>본 사이트의 가격·할인 정보는 참고용이며 실제 판매 가격과 다를 수 있습니다.</p>
    <p>© 2026 닭가슴살 특가 모음</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
